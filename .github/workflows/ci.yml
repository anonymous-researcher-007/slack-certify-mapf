name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ilp]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/slackcertify

      - name: Pytest (unit + property only)
        run: |
          pytest -m "not slow and not integration" -v \
            --cov=src/slackcertify \
            --cov-report=xml \
            --cov-report=term

      - name: Validate paper claims (smoke fixture)
        # Smoke-only on PRs so we exercise the validator's wiring
        # (schema parse + report rendering) on every change. The
        # full-claims pass against results/raw/*.csv runs after the
        # paper sweep, not in CI.
        run: |
          python scripts/validate_paper_claims.py \
            --results-dir tests/data/analysis_smoke \
            --claims tests/data/claims_smoke.yaml \
            --out /tmp/claim_validation_smoke.md \
            --tables-out /tmp/claim_validation_smoke_tables.tex

      - name: Upload coverage to Codecov
        # Non-fatal: codecov outages must not fail the build for an
        # open-source project that doesn't gate merges on coverage.
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
