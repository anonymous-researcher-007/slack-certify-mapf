name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Trusted Publisher: configure on PyPI as described in RELEASE.md.
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          md = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          # Match "## [<version>] - ..." up to the next "## [" or EOF.
          pat = re.compile(
              rf"##\s+\[{re.escape(version)}\][^\n]*\n(.+?)(?=\n##\s+\[|\Z)",
              re.DOTALL,
          )
          m = pat.search(md)
          body = m.group(1).strip() if m else "(no CHANGELOG.md entry)"
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write("body<<__EOF__\n" + body + "\n__EOF__\n")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/*.whl
            dist/*.tar.gz
