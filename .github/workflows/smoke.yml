name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.11-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py3.11-pip-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ilp]"

      - name: Run repro_smoke.sh
        run: bash scripts/repro_smoke.sh

      - name: Upload figures_smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figures_smoke
          path: results/figures_smoke/
          if-no-files-found: warn

      - name: Upload summary_smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary_smoke
          path: results/summary_smoke/
          if-no-files-found: warn
