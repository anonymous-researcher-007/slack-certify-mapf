name: integration

on:
  push:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.11-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py3.11-pip-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ilp]"

      - name: Pytest (integration, not-slow)
        run: pytest tests/integration -v -m "not slow"
