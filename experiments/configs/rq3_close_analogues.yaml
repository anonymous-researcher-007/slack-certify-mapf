experiment_name: rq3_close_analogues

# Maps and sweep grid.
maps:
  - warehouse-10-20-10-2-1
  - warehouse-20-40-10-2-2
  - random-32-32-20
  - room-64-64-16
  - maze-32-32-4
agent_counts: [100]
scen_seeds: [1, 2, 3, 4, 5]

# Nominal solver.
nominal_solver: lacam_star
nominal_time_limit_s: 2

# Methods to compare per cell.
methods:
  - slack_certify_probabilistic
  - btpg_max
  - kottinger_offline

# Per-method hyperparameters.
slack_certify_probabilistic:
  # required by §III Proposition 1's Δ_w=1 simulator-alignment
  # remark; do not change without revisiting the problem-formulation
  # section of the manuscript and docs/algorithm.md
  delta: 1
  p_d: 0.03
  epsilon: 0.05

# Rollout delay-model parameters.
bernoulli:
  p_d: 0.03

# Rollout configuration.
rollouts: 500
rollout_parallel_jobs: -1
