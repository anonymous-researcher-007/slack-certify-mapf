[coverage:run]
branch = True
source = slackcertify
omit =
    tests/*
    third_party/*
    src/slackcertify/_version.py
    */site-packages/*

[coverage:report]
show_missing = True
skip_covered = False
precision = 2
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
    \.\.\.

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
