[tox]
envlist = py310, py311, py312, lint, type, docs
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run the unit and integration tests on {basepython}
extras = dev
commands =
    pytest {posargs:-q}

[testenv:lint]
description = Run ruff and black --check
basepython = python3.11
extras = dev
commands =
    ruff check .
    ruff format --check .
    black --check .

[testenv:type]
description = Run mypy --strict on the slackcertify package
basepython = python3.11
extras = dev
commands =
    mypy --strict src/slackcertify

[testenv:docs]
description = Build the mkdocs documentation site
basepython = python3.11
extras = dev,docs
commands =
    mkdocs build --strict
